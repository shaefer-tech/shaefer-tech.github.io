name: Flutter Web
on: [push]
jobs:
  build:
runs-on: ubuntu-latest
        
    steps:
    - uses: actions/checkout@v1
    - uses: actions/setup-java@v1
      with:
        java-version: '12.x'
    - uses: subosito/flutter-action@v1
      with:
        flutter-version: '2.12.0' # you can use 1.12
        channel: 'beta' # Currently you have to use beta channel for Flutter web.
    - name: Upgrades flutter
      run: flutter upgrade
      working-directory: ./example
    - name: Enable Web
      run: flutter config --enable-web
      working-directory: ./example
    - name: Install dependencies
      run: flutter packages get
      working-directory: ./example
    - name: Build Web
      run: flutter build web
      working-directory: ./example
    - name: Deploy
      run: |
        cd example/build/web
        git init
        git config user.name  "shaefer-tech"
        git config user.email "schaefferking9@outlook.com"
        git remote add secure-origin https://${{ 6a68cdb3e29d887d66fbacdfceb4c00c09219753 
 }}@github.com/[shaefer-tech]/[shaefer-tech.github.io].git
        git checkout -b gh-pages
        git add .
        git commit -m "Updated docs"
        git push --force secure-origin gh-pages
